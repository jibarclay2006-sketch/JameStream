name: Publish JameStream

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message == 'Publish verified JameStream snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the verified source snapshot
        shell: bash
        run: |
          set -euo pipefail
          cp .github/workflows/bootstrap.yml /tmp/jamestream-bootstrap.yml
          cat bootstrap/patch.b64.* | base64 --decode | gzip --decompress > /tmp/jamestream.patch
          echo "6605f51c7970b6583cf7dee926dcfa2016244d6412ec461d24ceb13b30af63d8  /tmp/jamestream.patch" | sha256sum --check -

          git init /tmp/jamestream-source
          git -C /tmp/jamestream-source remote add origin https://github.com/xp-technologies-dev/p-stream.git
          git -C /tmp/jamestream-source fetch --depth=1 origin cf216a12269a88b426415f5cb87a0298252c6de0
          git -C /tmp/jamestream-source checkout --detach FETCH_HEAD
          git -C /tmp/jamestream-source apply --check /tmp/jamestream.patch
          git -C /tmp/jamestream-source apply /tmp/jamestream.patch
          rm -f /tmp/jamestream-source/public/ads/primary-banner.gif
          rm -f /tmp/jamestream-source/.github/workflows/ci.yml
          rm -rf /tmp/jamestream-source/.git

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf -- {} +
          cp -a /tmp/jamestream-source/. .
          mkdir -p .github/workflows
          cp /tmp/jamestream-bootstrap.yml .github/workflows/bootstrap.yml

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify the ad-free self-hosted build
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm lint
          pnpm build

      - name: Publish main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Create ad-free self-hosted JameStream"
          git push origin HEAD:main
