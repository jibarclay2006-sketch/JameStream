services:
  jamestream:
    build:
      context: .
      args:
        PWA_ENABLED: ${VITE_PWA_ENABLED:-true}
        APP_DOMAIN: ${VITE_APP_DOMAIN:-http://localhost:8080}
        BASE_URL: ${VITE_BASE_URL:-/}
        OPENSEARCH_ENABLED: ${VITE_OPENSEARCH_ENABLED:-false}
        TMDB_READ_API_KEY: ${VITE_TMDB_READ_API_KEY:-}
        CORS_PROXY_URL: ${VITE_CORS_PROXY_URL:-}
        M3U8_PROXY_URL: ${VITE_M3U8_PROXY_URL:-}
        DMCA_EMAIL: ${VITE_DMCA_EMAIL:-}
        NORMAL_ROUTER: ${VITE_NORMAL_ROUTER:-true}
        BACKEND_URL: ${VITE_BACKEND_URL:-}
        HAS_ONBOARDING: ${VITE_HAS_ONBOARDING:-true}
        HIDE_PROXY_ONBOARDING: ${VITE_HIDE_PROXY_ONBOARDING:-false}
        ONBOARDING_CHROME_EXTENSION_INSTALL_LINK: ${VITE_ONBOARDING_CHROME_EXTENSION_INSTALL_LINK:-}
        ONBOARDING_FIREFOX_EXTENSION_INSTALL_LINK: ${VITE_ONBOARDING_FIREFOX_EXTENSION_INSTALL_LINK:-}
        ONBOARDING_PROXY_INSTALL_LINK: ${VITE_ONBOARDING_PROXY_INSTALL_LINK:-}
        DISALLOWED_IDS: ${VITE_DISALLOWED_IDS:-}
        CDN_REPLACEMENTS: ${VITE_CDN_REPLACEMENTS:-}
        ALLOW_AUTOPLAY: ${VITE_ALLOW_AUTOPLAY:-false}
        ALLOW_FEBBOX_KEY: ${VITE_ALLOW_FEBBOX_KEY:-false}
        ALLOW_DEBRID_KEY: ${VITE_ALLOW_DEBRID_KEY:-false}
    ports:
      - "${JAMESTREAM_PORT:-8080}:80"
    restart: unless-stopped
